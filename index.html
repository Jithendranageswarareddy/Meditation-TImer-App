<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meditation Timer App</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell py-4 py-md-5">
    <div class="container app-container">
      <header class="app-header text-center">
        <h1 class="app-title">Meditation Timer</h1>
        <p class="app-subtitle mb-3">Find your inner peace.</p>
        <button id="darkModeToggle" class="btn btn-light btn-sm px-3" type="button">Dark Mode</button>
      </header>

      <main class="app-main">
        <section class="card app-card">
          <h2 class="section-title">Timer</h2>
          <div class="mb-3">
            <label for="durationSelect" class="form-label">Duration (minutes)</label>
            <select id="durationSelect" class="form-select">
              <option value="5" selected>5</option>
              <option value="10">10</option>
              <option value="15">15</option>
              <option value="20">20</option>
              <option value="30">30</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="techniqueInput" class="form-label">Meditation Technique</label>
            <input
              id="techniqueInput"
              type="text"
              class="form-control"
              placeholder="e.g, Mindfulness"
              maxlength="60"
            />
          </div>

          <div class="d-flex gap-2 gap-md-3 flex-wrap mb-3">
            <button id="startBtn" class="btn btn-success btn-sm px-3" type="button">Start</button>
            <button id="pauseBtn" class="btn btn-warning btn-sm px-3" type="button">Pause</button>
            <button id="resetBtn" class="btn btn-danger btn-sm px-3" type="button">Reset</button>
          </div>

          <p id="timerDisplay" class="timer-display mb-0">00:00</p>
        </section>

        <section class="card app-card">
          <h2 class="section-title">Session Tracking</h2>
          <p id="totalSessions" class="stat-line mb-1">Total Sessions: 0</p>
          <p id="totalTime" class="stat-line mb-0">Total Time Meditated: 0 minutes</p>
        </section>

        <section class="card app-card">
          <h2 class="section-title">History Log</h2>
          <ul id="historyList" class="list-group history-list">
            <li class="list-group-item text-muted empty-state">No completed sessions yet.</li>
          </ul>
        </section>

        <section class="card app-card">
          <h2 class="section-title">Daily Quote</h2>
          <blockquote id="quoteText" class="quote-text mb-2">Click refresh to fetch inspiration.</blockquote>
          <p id="quoteAuthor" class="quote-author mb-3"></p>
          <button id="refreshQuoteBtn" class="btn btn-secondary btn-sm" type="button">Refresh Quote</button>
        </section>
      </main>

      <footer class="text-center small mt-4">© 2026 Meditation Timer App</footer>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
